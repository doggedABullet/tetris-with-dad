<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris with Dad</title>
    <link rel="stylesheet" href="styles.css">
    <script src="game.js" defer></script>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #f0f0f0;
            color: #333;
        }
        #score {
            font-size: 24px;
            margin: 10px 0;
        }
        #instructions {
            font-size: 20px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Tetris with Dad</h1>
    <div id="score">Score: 0</div>
    <div id="instructions">
        <h2>Instructions:</h2>
        <p>Use the arrow keys to move the Tetris blocks. Rotate with the up arrow and pause with the spacebar.</p>
    </div>
    <div id="game-container"></div>
</body>
</html>
